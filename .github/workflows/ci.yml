name: CI-CD PIPELINE

on:
  push:
    branches: [main]

jobs:
  install-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Setup Node.js
        uses: actions/setup-node@v2
  test:
    runs-on: ubuntu-latest
    needs: install-dependencies
    steps:
      - name: Run tests
        run: npm test      
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name : Deploy Application
        run : echo "Deployed"
    